# 示例部署配置，仅供参考，请根据实际环境修改

# AWS / EC2 基本配置
region: us-west-2
securityGroupId: sg-0ed924fdf3170b7de
diskSizeGiB: 200                        # 所有实例的系统盘大小（GiB）

# 运行与 SSH
runDuration: 10000m                        # 计划关机时间（time.Duration 格式），会转成 sudo -n shutdown -h +N
sshUser: ubuntu
sshKeyDir: ""                           # 为空则默认使用 ~/.ssh
sshMaxConcurrency: 100                  # SSH 相关任务最大并发（等待 SSH + 远程命令启动）
sshReadyRetryCount: 3                   # SSH 就绪探测失败后重试次数（不含首次尝试）
sshReadyRetryInterval: 5s               # SSH 就绪探测重试间隔
keyName: dayong-op-stack               # 对应本地 ~/.ssh/dayong-op-stack.pem
logDir: logs
outputDir: output

# 链通用配置
l1ChainId: 7655 #3151908
l1RpcUrl: http://184.32.182.132/espace # https://confura.yidaiyilu0.site/espace #https://eth.yidaiyilu0.site/rpc 
l1RpcUrlWs: ws://184.32.182.132/ws # ws://47.243.70.39/ws
l1VaultMnemonic: "recall pistol island shrimp flash match wisdom habit dry drop finish double" # 源L1Vault（L1VaultMnemonic /m/44/60/0/0/0） 0xcE4CC6E76635FfAAD91a587f204011D3d3B96EB9
l1BridgeHubContract: 0x7aC81f608D15819148317EeAD3169734664205Bb
l1RegisterBridgePrivateKey: 0xa3d9e98f0ba98960bf3755b7519d18b2250b0b8be5e38d5483dcfa3875df2d6f # 0xef431755Bb97ed53874E3e27cAD2cD3399558e25
dryRun: false
forceDeployL2Chain: false

# services 为一个数组，每个元素表示一种 service 类型及其数量和命令
services:
  # 1) OP 部署：不显式设置 remote_cmd，则使用内置策略
  #    每台机器生成不同的 PRIVATE_KEY 和 L2_CHAIN_ID=10000+i
  #    命令示意：
  #      cd /home/ubuntu/op-work/scripts/deploy-op-stack &&
  #      PRIVATE_KEY=<pk> L2_CHAIN_ID=<id> ./deploy-with-env.sh
