  #   count: 1
  #   ami: ami-01695c193bcf5ba8e
  #   instanceType: c6a.4xlarge
  #   tagPrefix: ydyl
  #   remoteCmd: ""
  #   l1RpcUrl: "http://184.32.182.132:3031" # 如果为空则使用全局 l1RpcUrl, 
